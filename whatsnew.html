      <style>
         /* ─── What's New page-specific styles ─────────────── */

         .whatsnew-section {
            padding-top: 120px;
            padding-bottom: 80px;
            min-height: 100vh;
         }

         /* ── Release card ───────────────────────────────────── */
         /* Matches the site's signature: sharp corners, clipped
            top-right corner, monochrome tokens, left accent rail. */

         .release-card {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
            transition: var(--transition, all 0.2s ease);
            position: relative;
         }

         /* Signature clipped top-right corner (matches other cards) */
         .release-card::after {
            content: "";
            position: absolute;
            top: -1px;
            right: -1px;
            width: var(--clip-size, 12px);
            height: var(--clip-size, 12px);
            background: #000;
            border-left: 1px solid #2a2a2a;
            border-bottom: 1px solid #2a2a2a;
            transition: var(--transition, all 0.2s ease);
            z-index: 2;
         }

         /* Left accent rail */
         .release-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: #2a2a2a;
            transition: var(--transition, all 0.2s ease);
         }

         .release-card:hover {
            border-color: #555;
            background: #121212;
         }

         .release-card:hover::before {
            background: #fff;
         }

         .release-card:hover::after {
            border-color: #555;
         }

         /* ── Header ─────────────────────────────────────────── */

         .release-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 18px 24px;
            border-bottom: 1px solid #1c1c1c;
            background: #050505;
         }

         .release-title-row {
            display: flex;
            align-items: center;
            gap: 14px;
         }

         .release-version {
            font-family: "JetBrains Mono", monospace;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary, #fff);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition, all 0.2s ease);
         }

         .release-version:hover {
            color: var(--text-secondary, #888);
         }

         .release-version i {
            font-size: 0.8em;
            color: var(--text-muted, #444);
            transition: var(--transition, all 0.2s ease);
         }

         .release-version:hover i {
            color: var(--text-secondary, #888);
         }

         /* Inverted high-contrast badge, sharp corners — matches primary btn */
         .latest-badge {
            background: var(--text-primary, #fff);
            color: var(--bg-primary, #000);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 4px 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
         }

         .release-date {
            font-size: 0.8rem;
            color: var(--text-secondary, #888);
            display: flex;
            align-items: center;
            gap: 6px;
            font-variant-numeric: tabular-nums;
         }

         .release-date i {
            color: var(--text-muted, #444);
         }

         /* ── Meta row (date + copy button) ──────────────────── */

         .release-meta {
            display: flex;
            align-items: center;
            gap: 10px;
         }

         .copy-link-btn {
            background: none;
            border: 1px solid var(--border, #333);
            color: var(--text-muted, #444);
            cursor: pointer;
            padding: 6px 9px;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition, all 0.2s ease);
         }

         .copy-link-btn:hover {
            color: var(--text-primary, #fff);
            border-color: var(--text-muted, #444);
            background: var(--accent-dim, rgba(255, 255, 255, 0.1));
         }

         .copy-link-btn.copied {
            color: var(--bg-primary, #000);
            background: var(--text-primary, #fff);
            border-color: var(--text-primary, #fff);
         }

         /* ── Highlight for deep-linked cards ────────────────── */

         .release-card.highlighted {
            border-color: var(--text-primary, #fff);
            animation: highlight-pulse 3s ease-out;
         }

         .release-card.highlighted::before {
            background: var(--text-primary, #fff);
         }

         @keyframes highlight-pulse {
            0% {
               box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.25);
            }
            30% {
               box-shadow: 0 0 22px 3px rgba(255, 255, 255, 0.12);
            }
            100% {
               box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
         }

         /* ── Body content ───────────────────────────────────── */

         .release-body {
            padding: 24px;
            line-height: 1.75;
            color: var(--text-secondary, #888);
            font-size: 0.9rem;
         }

         .release-body h3 {
            color: var(--text-primary, #fff);
            font-size: 0.95rem;
            margin: 28px 0 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light, #222);
         }

         .release-body h3:first-child {
            margin-top: 0;
         }

         .release-body h4 {
            color: var(--text-primary, #fff);
            font-size: 0.9rem;
            margin: 20px 0 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
         }

         .release-body h5 {
            color: var(--text-primary, #fff);
            font-size: 0.88rem;
            margin: 16px 0 6px;
            font-weight: 600;
         }

         .release-body p {
            margin: 8px 0;
         }

         .release-body ul,
         .release-body ol {
            padding-left: 24px;
            margin: 8px 0;
         }

         .release-body li {
            margin: 4px 0;
         }

         .release-body code {
            font-family: "JetBrains Mono", monospace;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 1px 6px;
            font-size: 0.85em;
            color: #fff;
         }

         .release-body pre {
            background: #000;
            border: 1px solid #2a2a2a;
            padding: 16px;
            margin: 12px 0;
            overflow-x: auto;
         }

         .release-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.82rem;
         }

         .release-body hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 20px 0;
         }

         .release-body blockquote {
            border-left: 3px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            margin: 12px 0;
            color: var(--text-secondary, rgba(255, 255, 255, 0.5));
            font-style: italic;
         }

         .release-body a {
            color: var(--text-primary, #fff);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: rgba(255, 255, 255, 0.3);
            transition: text-decoration-color 0.2s ease;
         }

         .release-body a:hover {
            text-decoration-color: rgba(255, 255, 255, 0.7);
         }

         .release-body strong {
            color: var(--text-primary, #fff);
            font-weight: 600;
         }

         .release-body del {
            opacity: 0.5;
         }

         /* ── Fallback text for empty bodies ─────────────────── */

         .fallback-text {
            color: var(--text-secondary, rgba(255, 255, 255, 0.5));
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
         }

         .fallback-text i {
            opacity: 0.5;
         }

         /* ── No releases / error state ──────────────────────── */

         .no-releases {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary, rgba(255, 255, 255, 0.5));
         }

         .no-releases i {
            font-size: 2.5rem;
            margin-bottom: 16px;
            display: block;
            opacity: 0.4;
         }

         .no-releases.error i {
            color: #ff6b6b;
            opacity: 0.7;
         }

         .no-releases small {
            display: block;
            margin-top: 8px;
            font-size: 0.78rem;
            opacity: 0.6;
         }

         /* ── Loading placeholder ─────────────────────────────── */

         .loading-card {
            opacity: 0.5;
            pointer-events: none;
         }

         .loading-card .release-body {
            text-align: center;
            padding: 40px;
         }

         .loading-card .fa-spinner {
            font-size: 2rem;
            margin-bottom: 10px;
         }

         /* ── Blurred character backdrop (page-scoped) ─────────── */
         /* Keep the artwork but heavily blur + darken it so the
            solid B&W cards stay the focus. Extra negative inset
            hides the feathered blur edges. */

         .animated-bg::before {
            inset: -8%;
            filter: blur(16px) brightness(0.7);
         }

         .animated-bg .bg-video {
            filter: blur(16px) brightness(0.7);
         }

         .animated-bg::after {
            background: rgba(0, 0, 0, 0.8);
         }

         /* ── Navbar override (solid black & white, page-scoped) ── */

         .navbar {
            background: #000;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-bottom: 1px solid #2a2a2a;
         }

         /* ── Footer override ────────────────────────────────── */

         .footer {
            position: relative;
            z-index: 10;
            background: #000;
            border-top: 1px solid #1c1c1c;
         }

         .footer-content-mini {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            padding: 40px 0;
         }

         .footer-logo {
            font-family: "JetBrains Mono", monospace;
            font-size: 1.2rem;
            font-weight: 700;
         }

         .footer-links-mini {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
         }

         .footer-links-mini a {
            color: var(--text-secondary, rgba(255, 255, 255, 0.5));
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
         }

         .footer-links-mini a:hover {
            color: var(--text-primary, #fff);
         }

         .footer-socials-big {
            display: flex;
            gap: 20px;
         }

         .footer-socials-big a {
            color: var(--text-secondary, rgba(255, 255, 255, 0.5));
            font-size: 1.3rem;
            transition: color 0.3s ease;
         }

         .footer-socials-big a:hover {
            color: var(--text-primary, #fff);
         }

         /* ── Back-to-top button ─────────────────────────────── */

         .back-to-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #aaa;
            cursor: pointer;
            font-size: 0.95rem;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: var(--transition, all 0.2s ease);
         }

         .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
         }

         .back-to-top:hover {
            color: #fff;
            border-color: #555;
            background: #141414;
         }

         @media (max-width: 768px) {
            .back-to-top {
               bottom: 18px;
               right: 18px;
               width: 40px;
               height: 40px;
            }
         }

         /* ── Responsive ─────────────────────────────────────── */

         @media (max-width: 768px) {
            .whatsnew-section {
               padding-top: 100px;
               padding-bottom: 40px;
            }

            .release-header {
               padding: 16px 18px;
            }

            .release-version {
               font-size: 1rem;
            }

            .release-body {
               padding: 18px;
               font-size: 0.85rem;
            }

            .release-card {
               margin-bottom: 16px;
            }
         }
      </style>
